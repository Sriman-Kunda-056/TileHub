services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: tilehub-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tilehub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://tilehub.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: BUSINESS_NAME
        value: TileHub Pro
      - key: BUSINESS_GST
        sync: false
      - key: BUSINESS_ADDRESS
        sync: false
      - key: BUSINESS_PHONE
        sync: false
      - key: BUSINESS_EMAIL
        sync: false
      - key: GST_RATE
        value: '0.18'

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: tilehub-db
    databaseName: tilehub
    user: tilehub_user
    plan: free
